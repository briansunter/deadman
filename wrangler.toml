name = "deadman"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Check heartbeat every minute
[triggers]
crons = ["* * * * *"]

# Durable Object bindings
[[durable_objects.bindings]]
name = "HEARTBEAT_MONITOR"
class_name = "HeartbeatMonitor"

# Durable Object migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["HeartbeatMonitor"]

# Cloudflare Email Routing - send email binding
# Requires Email Routing enabled on your domain
[[send_email]]
name = "EMAIL"

# Secrets (set via `wrangler secret put <NAME>`):
#
#   wrangler secret put AUTH_TOKEN            # REQUIRED - secures all endpoints
#   wrangler secret put SLACK_WEBHOOK_URL      # Optional - Slack incoming webhook
#   wrangler secret put DISCORD_WEBHOOK_URL   # Optional - Discord channel webhook
#   wrangler secret put TELEGRAM_BOT_TOKEN    # Optional - Telegram bot token
#   wrangler secret put TELEGRAM_CHAT_ID      # Optional - Telegram chat/group ID

[vars]
# How long (seconds) without a heartbeat before alerting. Default: 5 minutes
HEARTBEAT_TIMEOUT_SECONDS = "300"
# Cooldown between repeated alert notifications (seconds). Default: 15 minutes
ALERT_COOLDOWN_SECONDS = "900"
# Cloudflare Email Routing addresses (sender must be on a CF Email Routing domain)
# EMAIL_FROM = "deadman@yourdomain.com"
# EMAIL_TO = "alerts@yourdomain.com"
# Custom alert messages. Use {elapsed_minutes}, {source}, {last_heartbeat}, {checked_at} placeholders.
# ALERT_TITLE = "Deadman Switch - ALERTING SYSTEM DOWN"
# ALERT_MESSAGE = "No heartbeat received for {elapsed_minutes} minute(s).\nLast source: {source}"
# RECOVERY_TITLE = "Deadman Switch - RECOVERED"
# RECOVERY_MESSAGE = "Alerting system is back online.\nSource: {source}"
